<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle Meal Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

.search{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search input{
    flex:1;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

.search button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    overflow:hidden;
}

iframe{
    width:100%;
    height:220px;
}

.content{
    padding:20px;
}

.content h2{
    margin-bottom:10px;
}

.info{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    text-align:center;
}

.info div{
    flex:1;
}

.info strong{
    display:block;
    color:#2563eb;
    font-size:22px;
}

.ingredients{
    margin-top:15px;
}

.ingredients ul{
    margin-left:20px;
}

.tag{
    display:inline-block;
    background:#16a34a;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    margin-bottom:10px;
}
</style>

</head>
<body>

<header>
<h1>💪 Muscle Meal Library</h1>
<p>รวมเมนูสร้างกล้าม พร้อมวิดีโอ YouTube</p>
</header>

<div class="container">

<div class="search">
<input type="text" placeholder="ค้นหาเมนู...">
<button>ค้นหา</button>
</div>

<div class="grid">

<div class="card">

<iframe
    width="560"
    height="315"
    src="https://www.youtube.com/embed/VnO7Hz90Wvo"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
</iframe>

<div class="content">

<span class="tag">High Protein</span>

<h2>Chicken Meal Prep</h2>

<div class="info">

<div>
<strong>45g</strong>
Protein
</div>

<div>
<strong>52g</strong>
Carb
</div>

<div>
<strong>11g</strong>
Fat
</div>

<div>
<strong>495</strong>
Calories
</div>

</div>

<div class="ingredients">
<h3>วัตถุดิบ</h3>

<ul>
<li>อกไก่</li>
<li>ข้าวหอมมะลิ</li>
<li>บรอกโคลี</li>
<li>น้ำมันมะกอก</li>
<li>เกลือ</li>
<li>พริกไทย</li>
</ul>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
